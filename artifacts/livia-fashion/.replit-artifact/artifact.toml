kind = "web"
previewPath = "/"
title = "Livia Fashion"
version = "1.0.0"
id = "artifacts/livia-fashion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21398

[services.development]
run = "pnpm --filter @workspace/livia-fashion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/livia-fashion", "run", "build" ]
publicDir = "artifacts/livia-fashion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21398"
BASE_PATH = "/"
